name: 🐛 Bug Report
description: Create a report to help us reproduce and fix the bug

body:
- type: markdown
  attributes:
    value: >
      #### Before submitting a bug, please make sure the issue hasn't been already addressed by searching through [the existing and past issues](https://github.com/facebook/rebalancer/issues).
- type: textarea
  attributes:
    label: 🐛 Describe the bug
    description: |
      Please provide a clear and concise description of what the bug is.

      If at all possible, add a minimal example so that we can reproduce the error by running the code.
      It is very important for the snippet to be as succinct (minimal) as possible, so please take time
      to trim down any irrelevant code to help us debug efficiently.
      Your example should be fully self-contained and not rely on any artifact that should be downloaded.

      If the code is too long (hopefully, it isn't), feel free to put it in a public gist and link it in
      the issue: https://gist.github.com.

      Please also paste or describe the results you observe instead of the expected results.
      If you observe an error, please paste the error message including the **full** traceback of the
      exception. It may be relevant to wrap error messages in ```` ```triple quotes blocks``` ````.
    placeholder: |
      A clear and concise description of what the bug is.

      ```c++
      // Sample code to reproduce the problem
      ```

      ```
      The error message you got, with the full traceback.
      ```
  validations:
    required: true
- type: textarea
  attributes:
    label: Versions
    description: |
      Please add the git hash of your build, if available.
  validations:
    required: true
- type: textarea
  attributes:
    label: Operating System and Compiler information
    description: |
      Please indicate what operating system and compiler you are using.
  validations:
    required: true
- type: markdown
  attributes:
    value: >
      Thanks for contributing 🎉!
